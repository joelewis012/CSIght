name: CSIght Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─── ESP32 Firmware builds — one job per chip target ─────────────────────────
  build-esp32-firmware:
    name: ESP32 Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32
            idf_version: v5.2.1
            name: ESP32-WROOM-32 / NodeMCU / 3-in-1 boards
          - target: esp32s2
            idf_version: v5.2.1
            name: FZ WiFi Dev Board / Adafruit Feather S2 / LOLIN S2 Mini
          - target: esp32s3
            idf_version: v5.2.1
            name: ESP32-S3 DevKit / XIAO-S3 / TinyS3
          - target: esp32c3
            idf_version: v5.2.1
            name: ESP32-C3 Mini / XIAO-C3
          - target: esp32c6
            idf_version: v5.2.1
            name: ESP32-C6 DevKit / XIAO-C6
          - target: esp32c5
            idf_version: v5.5.2
            name: ESP32-C5 DevKit (best CSI; requires IDF v5.5.2+)

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware for ${{ matrix.target }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.target }}
          path: esp32
          command: idf.py build

      - name: Collect firmware files
        run: |
          mkdir -p fw-out
          cp esp32/build/bootloader/bootloader.bin           fw-out/ || true
          cp esp32/build/partition_table/partition-table.bin fw-out/ || true
          cp esp32/build/csight_esp32.bin                    fw-out/ || true
          cp esp32/build/flash_args                          fw-out/ || true
          echo "=== Built for ${{ matrix.target }} ===" && ls -la fw-out/

      - uses: actions/upload-artifact@v4
        with:
          name: csight-firmware-${{ matrix.target }}
          path: fw-out/
          if-no-files-found: error

  # ─── Flipper FAP — Official ──────────────────────────────────────────────────
  build-fap-official:
    name: Flipper FAP (Official)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uFBT
        run: pip3 install ufbt

      - name: Update SDK and build
        working-directory: flipper
        run: |
          ufbt update --channel release
          ufbt
          find dist/ -type f 2>/dev/null || echo "No dist folder"
          find . -name "*.fap" 2>/dev/null || echo "No FAP found"

      - uses: actions/upload-artifact@v4
        with:
          name: csight-official
          path: flipper/dist/**/*.fap
          if-no-files-found: error

  # ─── Flipper FAP — Momentum ──────────────────────────────────────────────────
  build-fap-momentum:
    name: Flipper FAP (Momentum)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uFBT
        run: pip3 install ufbt

      - name: Update SDK and build
        working-directory: flipper
        run: |
          ufbt update --index-url https://up.momentum-fw.dev/firmware/directory.json --channel release
          ufbt
          find dist/ -type f 2>/dev/null || echo "No dist folder"
          find . -name "*.fap" 2>/dev/null || echo "No FAP found"

      - uses: actions/upload-artifact@v4
        with:
          name: csight-momentum
          path: flipper/dist/**/*.fap
          if-no-files-found: error

  # ─── Flipper FAP — Unleashed ─────────────────────────────────────────────────
  build-fap-unleashed:
    name: Flipper FAP (Unleashed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uFBT
        run: pip3 install ufbt

      - name: Update SDK and build
        working-directory: flipper
        run: |
          ufbt update --index-url https://up.unleashedflip.com/directory.json --channel release
          ufbt
          find dist/ -type f 2>/dev/null || echo "No dist folder"
          find . -name "*.fap" 2>/dev/null || echo "No FAP found"

      - uses: actions/upload-artifact@v4
        with:
          name: csight-unleashed
          path: flipper/dist/**/*.fap
          if-no-files-found: error

  # ─── Package release ZIP ─────────────────────────────────────────────────────
  package:
    name: Package Release
    needs: [build-esp32-firmware, build-fap-official, build-fap-momentum, build-fap-unleashed]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Show artifact contents
        run: find artifacts/ -type f | sort

      - name: Build release ZIP
        run: |
          # Flipper FAPs
          mkdir -p release/CSIght/flipper/official
          mkdir -p release/CSIght/flipper/momentum
          mkdir -p release/CSIght/flipper/unleashed

          find artifacts/csight-official  -name "*.fap" -exec cp {} release/CSIght/flipper/official/  \; || true
          find artifacts/csight-momentum  -name "*.fap" -exec cp {} release/CSIght/flipper/momentum/  \; || true
          find artifacts/csight-unleashed -name "*.fap" -exec cp {} release/CSIght/flipper/unleashed/ \; || true

          # ESP32 firmware — one folder per chip target
          for TARGET in esp32 esp32s2 esp32s3 esp32c3 esp32c6 esp32c5; do
            mkdir -p "release/CSIght/esp32/$TARGET"
            if [ -d "artifacts/csight-firmware-$TARGET" ]; then
              cp artifacts/csight-firmware-$TARGET/* "release/CSIght/esp32/$TARGET/" || true
            fi
          done

          # Docs
          cp README.md FLASH_INSTRUCTIONS.md LICENSE release/CSIght/

          VERSION="${GITHUB_REF_NAME:-dev}"
          ZIP="CSIght-${VERSION}.zip"
          cd release && zip -r "../$ZIP" CSIght/
          cd ..
          ls -lh "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: CSIght-release
          path: CSIght-*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CSIght-*.zip
          generate_release_notes: false
